<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>test</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Microsoft JhengHei', '微軟正黑體', 'Microsoft YaHei', 'Helvetica Neue', Helvetica, Arial, sans-serif;
            background: #fafafa;
            color: #1a1a1a;
            line-height: 1.6;
            font-weight: 400;
            min-height: 100vh;
            padding: 60px 20px;
        }

        .container {
            max-width: 700px;
            margin: 0 auto;
        }

        .card {
            background: #fff;
            border: 1px solid #e8e8e8;
            padding: 60px 50px;
        }

        .logo {
            display: none;
            text-align: center;
            margin-bottom: 30px;
        }

        .logo img {
            max-height: 80px;
            max-width: 100%;
        }

        h2 {
            font-size: 28px;
            font-weight: 500;
            color: #3C3C3C;
            margin-bottom: 50px;
            letter-spacing: 1px;
        }

        .btn {
            padding: 16px 50px;
            border: 1px solid #3C3C3C;
            background: #3C3C3C;
            color: #fff;
            font-size: 16px;
            font-weight: 500;
            letter-spacing: 1px;
            cursor: pointer;
            transition: all 0.2s ease;
            text-transform: uppercase;
            margin-right: 10px;
            border-radius: 5px;
        }

        .btn:hover {
            background: #333;
        }

        .btn-secondary {
            background: #fff;
            color: #888;
            border-color: #ccc;
        }

        .btn-secondary:hover {
            background: #f5f5f5;
            color: #3C3C3C;
        }

        .form-group {
            margin-bottom: 40px;
        }

        label {
            display: block;
            margin-bottom: 12px;
            font-weight: 500;
            color: #333;
            font-size: 16px;
            letter-spacing: 0.5px;
        }

        input[type="text"],
        input[type="email"],
        input[type="number"],
        input[type="date"],
        textarea,
        select {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 18px;
            transition: border-color 0.3s;
            background: #fff;
            color: #3C3C3C;
        }

        input:focus,
        textarea:focus,
        select:focus {
            outline: none;
            border-color: #3C3C3C;
            box-shadow: 0 0 0 2px rgba(0, 0, 0, 0.1);
        }

        textarea {
            min-height: 120px;
            resize: vertical;
            border: 1px solid #e8e8e8;
            padding: 12px;
        }

        textarea:focus {
            border-color: #3C3C3C;
            box-shadow: 0 0 0 2px rgba(0, 0, 0, 0.1);
        }

        input::placeholder,
        textarea::placeholder {
            color: #999;
        }

        .checkbox-group, .radio-group {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .checkbox-group label, .radio-group label {
            font-weight: 500;
            display: flex;
            align-items: center;
            cursor: pointer;
            font-size: 16px;
        }

        .checkbox-group input, .radio-group input {
            width: 20px;
            height: 20px;
            margin-right: 12px;
        }

        .namelist-group {
            width: 100%;
        }

        .namelist-container {
            margin-bottom: 10px;
        }

        .namelist-item {
            display: flex;
            gap: 10px;
            margin-bottom: 10px;
        }

        .namelist-item input {
            flex: 1;
        }

        .toast {
            position: fixed;
            top: 40px;
            left: 50%;
            transform: translateX(-50%);
            background: #3C3C3C;
            color: #fff;
            padding: 15px 30px;
            font-size: 13px;
            letter-spacing: 1px;
            z-index: 2000;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .toast.show {
            opacity: 1;
        }

        .toast.error {
            background: #ff4444;
        }

        .required {
            color: #ff4444;
        }

        .form-actions {
            text-align: left;
            margin-top: 60px;
            padding-top: 40px;
            border-top: 1px solid #e8e8e8;
        }

        @media (max-width: 768px) {
            .card {
                padding: 40px 30px;
            }

            body {
                padding: 30px 15px;
            }

            h2 {
                font-size: 20px;
                margin-bottom: 40px;
            }

            .form-actions {
                margin-top: 40px;
            }
        }

        @media print {
            body {
                background: #fff;
                padding: 0;
                font-size: 12pt;
                min-height: auto;
                font-family: 'BiauKai', 'KaiTi', 'DFKai-SB', serif !important;
            }

            .alert,
            .btn,
            .form-actions,
            .toast {
                display: none !important;
            }

            .logo {
                display: block !important;
                margin-bottom: 10pt;
            }

            .logo img {
                max-height: 60pt;
            }

            .container {
                max-width: 100%;
            }

            .card {
                border: none;
                padding: 0;
                box-shadow: none;
                background: #fff !important;
            }

            h2 {
                font-size: 20pt;
                margin: 15pt 0 20pt 0;
                font-weight: 500;
                border-bottom: 1.5pt solid #3C3C3C;
                padding-bottom: 8pt;
                text-align: center;
                letter-spacing: 1pt;
            }

            .form-group {
                margin-bottom: 12pt;
                page-break-inside: avoid;
                display: flex;
                flex-wrap: wrap;
                align-items: baseline;
            }

            label {
                font-weight: 700;
                font-size: 13pt;
                margin-right: 8pt;
                margin-bottom: 3pt;
                width: auto;
                min-width: 80pt;
            }

            .required {
                display: none !important;
            }

            input[type="text"],
            input[type="email"],
            input[type="number"],
            input[type="date"],
            textarea,
            select {
                border: none !important;
                border-bottom: none !important;
                padding: 4pt 0;
                font-size: 12pt;
                background: transparent !important;
                outline: none !important;
                flex: 1;
                min-width: 150pt;
                box-shadow: none !important;
            }

            select {
                appearance: none;
                -webkit-appearance: none;
                background-image: none;
            }

            textarea {
                border: none !important;
                padding: 8pt 0;
                min-height: 80pt;
                width: 100%;
                resize: none;
                box-shadow: none !important;
            }

            .checkbox-group,
            .radio-group {
                margin-top: 0;
                width: 100%;
                margin-left: 88pt;
            }

            .checkbox-group label,
            .radio-group label {
                margin-bottom: 6pt;
                display: block !important;
                font-weight: 400;
                width: auto;
                min-width: auto;
                position: relative;
            }

            input[type="checkbox"],
            input[type="radio"] {
                width: 14pt;
                height: 14pt;
                margin-right: 6pt;
                margin-left: 0;
                vertical-align: middle;
                -webkit-print-color-adjust: exact;
                print-color-adjust: exact;
            }

            .selecttext-group {
                display: flex !important;
                gap: 0 !important;
                flex: 1 !important;
                flex-wrap: nowrap !important;
                min-width: 0 !important;
            }

            .selecttext-group select {
                flex: 0 0 50pt !important;
                width: 50pt !important;
                max-width: 50pt !important;
                min-width: 0 !important;
                margin-right: 5pt !important;
            }

            .selecttext-group input {
                flex: 1 !important;
                min-width: 0 !important;
            }

            .namelist-group {
                width: 100%;
            }

            .namelist-container {
                width: 100%;
            }

            .namelist-item {
                display: flex !important;
                gap: 5pt !important;
                margin-bottom: 5pt !important;
            }

            .namelist-item input {
                flex: 1 !important;
                border-bottom: none !important;
            }

            .namelist-item button {
                display: none !important;
            }

            .time-group,
            .datetime-group {
                display: flex !important;
                align-items: baseline !important;
                gap: 5pt !important;
                flex-wrap: wrap !important;
            }

            .time-group select,
            .datetime-group select {
                display: none !important;
            }

            .time-separator {
                display: none !important;
            }

            .time-group .time-display,
            .datetime-group .datetime-display {
                display: inline !important;
                border-bottom: none !important;
                padding: 4pt 0 !important;
                font-size: 12pt !important;
                min-width: 80pt !important;
            }

            .datetime-group input[type="date"] {
                display: none !important;
            }

            .signature-section {
                display: block !important;
                margin-top: 20pt;
                padding-top: 15pt;
                border-top: 1.5pt solid #3C3C3C;
            }

            .signature-line {
                display: inline-block;
                width: 150pt;
                border-bottom: 1pt solid #3C3C3C;
                margin: 0 15pt;
                height: 30pt;
                vertical-align: bottom;
            }

            .signature-section strong {
                font-weight: 500;
                font-size: 11pt;
                margin-right: 10pt;
            }

            @page {
                margin: 20mm 15mm;
                size: A4;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <div class="logo">
                <img src="https://hsingfu-golf.com.tw/wp-content/uploads/2023/07/OO.png" alt="Logo">
            </div>
            <h2 id="formTitle">test</h2>
            <form id="userForm">
                <div id="formFields"></div>
                <div class="form-actions">
                    <button type="submit" class="btn btn-success">提交</button>
                    <button type="reset" class="btn btn-secondary">清除</button>
                </div>
            </form>
        </div>
    </div>
<script>
        const formData = {
        "id": "1",
        "name": "test",
        "spreadsheet_id": "1Qd-Uyu636v-2KKRhG6uZ8qC6Mpmwal9FSc4vL0ZcDao",
        "apps_script_url": "https://script.google.com/macros/s/AKfycbz797P8xuxU3dytZ2T5aqsvfUMidTnFps-rY1ZDNmfNXKqMHYMYdpceJjXhHOvw3YXoUw/exec",
        "items": [
                {
                        "type": "text",
                        "label": "123",
                        "name": "123",
                        "required": true
                }
        ],
        "signatures": [
                {
                        "label": "123"
                }
        ],
        "created_at": "2025-11-18 13:20:12",
        "updated_at": "2025-11-18 13:21:21",
        "spreadsheetId": "1Qd-Uyu636v-2KKRhG6uZ8qC6Mpmwal9FSc4vL0ZcDao",
        "appsScriptUrl": "https://script.google.com/macros/s/AKfycbz797P8xuxU3dytZ2T5aqsvfUMidTnFps-rY1ZDNmfNXKqMHYMYdpceJjXhHOvw3YXoUw/exec"
};
        
        function loadForm() {
            document.getElementById('formTitle').textContent = formData.name;
            const container = document.getElementById('formFields');
            
            formData.items.forEach(item => {
                const div = document.createElement('div');
                div.className = 'form-group';

                const label = document.createElement('label');
                label.innerHTML = item.label + (item.required ? '<span class="required"> *</span>' : '');
                div.appendChild(label);

                let input;
                switch(item.type) {
                    case 'textarea':
                        input = document.createElement('textarea');
                        input.name = item.name;
                        if (item.required) input.required = true;
                        div.appendChild(input);
                        break;

                    case 'select':
                        input = document.createElement('select');
                        input.name = item.name;
                        if (item.required) input.required = true;
                        
                        const defaultOption = document.createElement('option');
                        defaultOption.value = '';
                        defaultOption.textContent = '選擇';
                        input.appendChild(defaultOption);
                        
                        if (item.options) {
                            item.options.forEach(opt => {
                                const option = document.createElement('option');
                                option.value = opt;
                                option.textContent = opt;
                                input.appendChild(option);
                            });
                        }
                        div.appendChild(input);
                        break;

                    case 'selecttext':
                        const selectGroup = document.createElement('div');
                        selectGroup.className = 'selecttext-group';
                        selectGroup.style.display = 'flex';
                        selectGroup.style.gap = '15px';
                        selectGroup.style.alignItems = 'center';
                        
                        const selectInput = document.createElement('select');
                        selectInput.id = item.name + '_select';
                        selectInput.name = item.name + '_select';
                        selectInput.style.flex = '0 0 150px';
                        if (item.required) selectInput.required = true;
                        
                        const defaultOpt = document.createElement('option');
                        defaultOpt.value = '';
                        defaultOpt.textContent = '選擇類別';
                        selectInput.appendChild(defaultOpt);
                        
                        if (item.options) {
                            item.options.forEach(opt => {
                                const option = document.createElement('option');
                                option.value = opt;
                                option.textContent = opt;
                                selectInput.appendChild(option);
                            });
                        }
                        
                        const textInput = document.createElement('input');
                        textInput.type = 'text';
                        textInput.name = item.name + '_text';
                        textInput.id = item.name + '_text';
                        textInput.placeholder = '請先選擇類別';
                        textInput.style.flex = '1';
                        textInput.disabled = true;
                        
                        selectInput.addEventListener('change', function() {
                            if (this.value) {
                                textInput.disabled = false;
                                textInput.placeholder = '請輸入' + this.value + '的名稱';
                                if (item.required) textInput.required = true;
                            } else {
                                textInput.disabled = true;
                                textInput.value = '';
                                textInput.placeholder = '請先選擇類別';
                                textInput.required = false;
                            }
                        });
                        
                        selectGroup.appendChild(selectInput);
                        selectGroup.appendChild(textInput);
                        div.appendChild(selectGroup);
                        break;

                    case 'radio':
                        const radioGroup = document.createElement('div');
                        radioGroup.className = 'radio-group';
                        if (item.options) {
                            item.options.forEach((opt, idx) => {
                                const radioDiv = document.createElement('label');
                                const radio = document.createElement('input');
                                radio.type = 'radio';
                                radio.name = item.name;
                                radio.value = opt;
                                if (item.required) radio.required = true;
                                
                                radioDiv.appendChild(radio);
                                radioDiv.appendChild(document.createTextNode(opt));
                                radioGroup.appendChild(radioDiv);
                            });
                        }
                        div.appendChild(radioGroup);
                        break;

                    case 'checkbox':
                        const checkboxGroup = document.createElement('div');
                        checkboxGroup.className = 'checkbox-group';
                        if (item.options) {
                            item.options.forEach(opt => {
                                const checkboxDiv = document.createElement('label');
                                const checkbox = document.createElement('input');
                                checkbox.type = 'checkbox';
                                checkbox.name = item.name;
                                checkbox.value = opt;
                                
                                checkboxDiv.appendChild(checkbox);
                                checkboxDiv.appendChild(document.createTextNode(opt));
                                checkboxGroup.appendChild(checkboxDiv);
                            });
                        }
                        div.appendChild(checkboxGroup);
                        break;

                    case 'date':
                        input = document.createElement('input');
                        input.type = 'date';
                        input.name = item.name;
                        if (item.required) input.required = true;
                        div.appendChild(input);
                        break;

                    case 'time':
                        const timeGroup = document.createElement('div');
                        timeGroup.className = 'time-group';
                        timeGroup.style.display = 'flex';
                        timeGroup.style.gap = '10px';
                        timeGroup.style.alignItems = 'center';
                        
                        const hourSelect = document.createElement('select');
                        hourSelect.name = item.name + '_hour';
                        hourSelect.id = item.name + '_hour';
                        hourSelect.style.flex = '0 0 80px';
                        if (item.required) hourSelect.required = true;
                        
                        const hourDefault = document.createElement('option');
                        hourDefault.value = '';
                        hourDefault.textContent = '時';
                        hourSelect.appendChild(hourDefault);
                        
                        for (let i = 0; i < 24; i++) {
                            const option = document.createElement('option');
                            option.value = (i < 10 ? '0' : '') + i;
                            option.textContent = (i < 10 ? '0' : '') + i;
                            hourSelect.appendChild(option);
                        }
                        
                        const minuteSelect = document.createElement('select');
                        minuteSelect.name = item.name + '_minute';
                        minuteSelect.id = item.name + '_minute';
                        minuteSelect.style.flex = '0 0 80px';
                        if (item.required) minuteSelect.required = true;
                        
                        const minuteDefault = document.createElement('option');
                        minuteDefault.value = '';
                        minuteDefault.textContent = '分';
                        minuteSelect.appendChild(minuteDefault);
                        
                        for (let i = 0; i < 60; i += 5) {
                            const option = document.createElement('option');
                            option.value = (i < 10 ? '0' : '') + i;
                            option.textContent = (i < 10 ? '0' : '') + i;
                            minuteSelect.appendChild(option);
                        }
                        
                        const timeDisplay = document.createElement('span');
                        timeDisplay.className = 'time-display';
                        timeDisplay.id = item.name + '_display';
                        timeDisplay.style.fontSize = '16px';
                        timeDisplay.style.color = '#3C3C3C';
                        timeDisplay.style.display = 'none';
                        
                        const updateTimeDisplay = function() {
                            const hour = hourSelect.value;
                            const minute = minuteSelect.value;
                            if (hour && minute) {
                                timeDisplay.textContent = hour + ':' + minute;
                                timeDisplay.style.display = 'inline';
                            } else {
                                timeDisplay.style.display = 'none';
                            }
                        };
                        
                        hourSelect.addEventListener('change', updateTimeDisplay);
                        minuteSelect.addEventListener('change', updateTimeDisplay);
                        
                        const timeSeparator = document.createElement('span');
                        timeSeparator.className = 'time-separator';
                        timeSeparator.textContent = '：';
                        
                        timeGroup.appendChild(hourSelect);
                        timeGroup.appendChild(timeSeparator);
                        timeGroup.appendChild(minuteSelect);
                        timeGroup.appendChild(timeDisplay);
                        div.appendChild(timeGroup);
                        break;

                    case 'datetime':
                        const datetimeGroup = document.createElement('div');
                        datetimeGroup.className = 'datetime-group';
                        
                        const dateInput = document.createElement('input');
                        dateInput.type = 'date';
                        dateInput.name = item.name + '_date';
                        dateInput.id = item.name + '_date';
                        dateInput.style.marginBottom = '10px';
                        if (item.required) dateInput.required = true;
                        
                        const timeSubGroup = document.createElement('div');
                        timeSubGroup.style.display = 'flex';
                        timeSubGroup.style.gap = '10px';
                        timeSubGroup.style.alignItems = 'center';
                        
                        const dtHourSelect = document.createElement('select');
                        dtHourSelect.name = item.name + '_hour';
                        dtHourSelect.id = item.name + '_hour';
                        dtHourSelect.style.flex = '0 0 80px';
                        if (item.required) dtHourSelect.required = true;
                        
                        const dtHourDefault = document.createElement('option');
                        dtHourDefault.value = '';
                        dtHourDefault.textContent = '時';
                        dtHourSelect.appendChild(dtHourDefault);
                        
                        for (let i = 0; i < 24; i++) {
                            const option = document.createElement('option');
                            option.value = (i < 10 ? '0' : '') + i;
                            option.textContent = (i < 10 ? '0' : '') + i;
                            dtHourSelect.appendChild(option);
                        }
                        
                        const dtMinuteSelect = document.createElement('select');
                        dtMinuteSelect.name = item.name + '_minute';
                        dtMinuteSelect.id = item.name + '_minute';
                        dtMinuteSelect.style.flex = '0 0 80px';
                        if (item.required) dtMinuteSelect.required = true;
                        
                        const dtMinuteDefault = document.createElement('option');
                        dtMinuteDefault.value = '';
                        dtMinuteDefault.textContent = '分';
                        dtMinuteSelect.appendChild(dtMinuteDefault);
                        
                        for (let i = 0; i < 60; i += 5) {
                            const option = document.createElement('option');
                            option.value = (i < 10 ? '0' : '') + i;
                            option.textContent = (i < 10 ? '0' : '') + i;
                            dtMinuteSelect.appendChild(option);
                        }
                        
                        const datetimeDisplay = document.createElement('span');
                        datetimeDisplay.className = 'datetime-display';
                        datetimeDisplay.id = item.name + '_display';
                        datetimeDisplay.style.fontSize = '16px';
                        datetimeDisplay.style.color = '#3C3C3C';
                        datetimeDisplay.style.display = 'none';
                        
                        const updateDatetimeDisplay = function() {
                            const date = dateInput.value;
                            const hour = dtHourSelect.value;
                            const minute = dtMinuteSelect.value;
                            if (date && hour && minute) {
                                datetimeDisplay.textContent = date + ' ' + hour + ':' + minute;
                                datetimeDisplay.style.display = 'inline';
                            } else {
                                datetimeDisplay.style.display = 'none';
                            }
                        };
                        
                        dateInput.addEventListener('change', updateDatetimeDisplay);
                        dtHourSelect.addEventListener('change', updateDatetimeDisplay);
                        dtMinuteSelect.addEventListener('change', updateDatetimeDisplay);
                        
                        const datetimeSeparator = document.createElement('span');
                        datetimeSeparator.className = 'time-separator';
                        datetimeSeparator.textContent = '：';
                        
                        timeSubGroup.appendChild(dtHourSelect);
                        timeSubGroup.appendChild(datetimeSeparator);
                        timeSubGroup.appendChild(dtMinuteSelect);
                        timeSubGroup.appendChild(datetimeDisplay);
                        
                        datetimeGroup.appendChild(dateInput);
                        datetimeGroup.appendChild(timeSubGroup);
                        div.appendChild(datetimeGroup);
                        break;

                    case 'email':
                        input = document.createElement('input');
                        input.type = 'email';
                        input.name = item.name;
                        if (item.required) input.required = true;
                        div.appendChild(input);
                        break;

                    case 'number':
                        input = document.createElement('input');
                        input.type = 'number';
                        input.name = item.name;
                        if (item.required) input.required = true;
                        div.appendChild(input);
                        break;

                    case 'namelist':
                        const nameListGroup = document.createElement('div');
                        nameListGroup.className = 'namelist-group';
                        nameListGroup.id = 'namelist-' + item.name;
                        
                        const nameListContainer = document.createElement('div');
                        nameListContainer.className = 'namelist-container';
                        
                        const addNameBtn = document.createElement('button');
                        addNameBtn.type = 'button';
                        addNameBtn.className = 'btn btn-secondary';
                        addNameBtn.textContent = '+ 新增人名';
                        addNameBtn.style.marginTop = '10px';
                        
                        let nameIndex = 0;
                        addNameBtn.onclick = function() {
                            const inputWrapper = document.createElement('div');
                            inputWrapper.className = 'namelist-item';
                            inputWrapper.style.display = 'flex';
                            inputWrapper.style.gap = '10px';
                            inputWrapper.style.marginBottom = '10px';
                            
                            const nameInput = document.createElement('input');
                            nameInput.type = 'text';
                            nameInput.name = item.name + '_' + nameIndex;
                            nameInput.placeholder = '請輸入姓名';
                            nameInput.style.flex = '1';
                            if (item.required) nameInput.required = true;
                            
                            const removeBtn = document.createElement('button');
                            removeBtn.type = 'button';
                            removeBtn.className = 'btn btn-sm btn-danger';
                            removeBtn.textContent = '×';
                            removeBtn.onclick = function() {
                                inputWrapper.remove();
                            };
                            
                            inputWrapper.appendChild(nameInput);
                            inputWrapper.appendChild(removeBtn);
                            nameListContainer.appendChild(inputWrapper);
                            nameIndex++;
                        };
                        
                        nameListGroup.appendChild(nameListContainer);
                        nameListGroup.appendChild(addNameBtn);
                        div.appendChild(nameListGroup);
                        break;

                    default:
                        input = document.createElement('input');
                        input.type = 'text';
                        input.name = item.name;
                        if (item.required) input.required = true;
                        div.appendChild(input);
                }

                container.appendChild(div);
            });
            
            if (formData.signatures && formData.signatures.length > 0) {
                const signatureDiv = document.createElement('div');
                signatureDiv.className = 'signature-section';
                signatureDiv.style.display = 'none';
                
                let signatureHTML = '';
                formData.signatures.forEach(sig => {
                    signatureHTML += `
                        <div style="margin-bottom: 30px;">
                            <strong>${sig.label}：</strong>
                            <span class="signature-line"></span>
                        </div>
                    `;
                });
                
                signatureDiv.innerHTML = signatureHTML;
                container.appendChild(signatureDiv);
            }
        }

        document.getElementById('userForm').addEventListener('submit', function(e) {
            e.preventDefault();
            submitForm();
        });

        function formatDateTime(date) {
            const year = date.getFullYear();
            const month = String(date.getMonth() + 1).padStart(2, '0');
            const day = String(date.getDate()).padStart(2, '0');
            const hours = String(date.getHours()).padStart(2, '0');
            const minutes = String(date.getMinutes()).padStart(2, '0');
            return year + '/' + month + '/' + day + ' ' + hours + ':' + minutes;
        }

        function submitForm() {
            const formElement = document.getElementById('userForm');
            const formData_obj = new FormData(formElement);
            
            const data = {};
            data['提交時間'] = formatDateTime(new Date());
            
            const processedKeys = new Set();
            
            const namelistBaseKeys = new Set();
            formData.items.forEach(item => {
                if (item.type === 'namelist') {
                    namelistBaseKeys.add(item.name);
                }
            });
            
            for (let [key, value] of formData_obj.entries()) {
                if (processedKeys.has(key)) continue;
                
                let isNamelistField = false;
                for (let baseKey of namelistBaseKeys) {
                    if (key.startsWith(baseKey + '_')) {
                        const suffix = key.substring(baseKey.length + 1);
                        if (suffix && !isNaN(parseInt(suffix)) && suffix === parseInt(suffix).toString()) {
                            isNamelistField = true;
                            processedKeys.add(key);
                            break;
                        }
                    }
                }
                if (isNamelistField) continue;
                
                if (key.endsWith('_date')) {
                    const baseKey = key.replace('_date', '');
                    const hourKey = baseKey + '_hour';
                    const minuteKey = baseKey + '_minute';
                    const hour = formData_obj.get(hourKey);
                    const minute = formData_obj.get(minuteKey);
                    if (value && hour && minute) {
                        data[baseKey] = value + ' ' + hour + ':' + minute;
                    } else if (value) {
                        data[baseKey] = value;
                    }
                    processedKeys.add(key);
                    processedKeys.add(hourKey);
                    processedKeys.add(minuteKey);
                } else if (key.endsWith('_hour')) {
                    const baseKey = key.replace('_hour', '');
                    if (processedKeys.has(baseKey + '_date')) continue;
                    const minuteKey = baseKey + '_minute';
                    const minute = formData_obj.get(minuteKey);
                    if (value && minute) {
                        data[baseKey] = value + ':' + minute;
                    } else if (value) {
                        data[baseKey] = value;
                    }
                    processedKeys.add(key);
                    processedKeys.add(minuteKey);
                } else if (key.endsWith('_select')) {
                    const baseKey = key.replace('_select', '');
                    data[baseKey] = value;
                    processedKeys.add(key);
                } else if (key.endsWith('_text')) {
                    const baseKey = key.replace('_text', '');
                    data[baseKey + '_名稱'] = value;
                    processedKeys.add(key);
                } else {
                    const checkboxes = formElement.querySelectorAll(`[name="${key}"]:checked`);
                    if (checkboxes.length > 1) {
                        data[key] = Array.from(checkboxes).map(cb => cb.value).join(', ');
                    } else {
                        data[key] = value;
                    }
                }
            }
            
            formData.items.forEach(item => {
                if (item.type === 'namelist') {
                    Object.keys(data).forEach(key => {
                        if (key.startsWith(item.name + '_')) {
                            const suffix = key.substring(item.name.length + 1);
                            if (suffix && !isNaN(parseInt(suffix)) && suffix === parseInt(suffix).toString()) {
                                delete data[key];
                            }
                        }
                    });
                    
                    const nameListContainer = formElement.querySelector('#namelist-' + item.name + ' .namelist-container');
                    if (nameListContainer) {
                        const nameInputs = nameListContainer.querySelectorAll('input[type="text"]');
                        nameInputs.forEach((input, idx) => {
                            if (input.value && input.value.trim() !== '') {
                                data[item.name + '_' + (idx + 1)] = input.value.trim();
                            }
                        });
                    }
                }
            });
            
            Object.keys(data).forEach(key => {
                if (Array.isArray(data[key])) {
                    data[key].forEach((val, idx) => {
                        data[`${key}_${idx + 1}`] = val;
                    });
                    delete data[key];
                }
            });
            
            sendToGoogleSheets(formData.spreadsheetId, formData.appsScriptUrl, data);
        }

        function sendToGoogleSheets(spreadsheetId, appsScriptUrl, data) {
            if (!spreadsheetId && !appsScriptUrl) {
                showAlert('準備列印...', 'success');
                setTimeout(() => {
                    printForm();
                    setTimeout(() => {
                        document.getElementById('userForm').reset();
                    }, 3000);
                }, 500);
                return;
            }

            if (!spreadsheetId) {
                showAlert('尚未設定試算表 ID', 'error');
                return;
            }

            if (appsScriptUrl) {
                showLoadingAlert(1);
                
                const requestData = JSON.stringify({ 
                    spreadsheetId: spreadsheetId, 
                    rowData: data 
                });
                
                let progress = 1;
                let progressInterval = setInterval(() => {
                    if (progress < 70) {
                        progress += Math.random() * 8 + 2;
                        if (progress > 70) progress = 70;
                        showLoadingAlert(Math.floor(progress));
                    }
                }, 100);
                
                const fetchPromise = fetch(appsScriptUrl, {
                    method: 'POST',
                    headers: { 'Content-Type': 'text/plain' },
                    body: requestData
                });
                
                const timeoutPromise = new Promise((_, reject) => {
                    setTimeout(() => reject(new Error('Timeout')), 30000);
                });
                
                Promise.race([fetchPromise, timeoutPromise])
                    .then(response => {
                        clearInterval(progressInterval);
                        
                        if (!response.ok) {
                            throw new Error('Response not ok');
                        }
                        
                        return response.json();
                    })
                    .then(result => {
                        progress = 99;
                        showLoadingAlert(progress);
                        
                        setTimeout(() => {
                            if (result.success) {
                                showLoadingAlert(100);
                                setTimeout(() => {
                                    hideLoadingAlert();
                                    showAlert('提交成功', 'success');
                                    setTimeout(() => {
                                        printForm();
                                        setTimeout(() => {
                                            document.getElementById('userForm').reset();
                                        }, 3000);
                                    }, 500);
                                }, 200);
                            } else {
                                hideLoadingAlert();
                                showAlert('提交失敗', 'error');
                            }
                        }, 200);
                    })
                    .catch(error => {
                        clearInterval(progressInterval);
                        hideLoadingAlert();
                        
                        if (error.message === 'Timeout') {
                            showAlert('提交超時，請稍後再試', 'error');
                        } else {
                            showAlert('提交失敗', 'error');
                            console.error('提交錯誤：', error);
                        }
                    });
            } else {
                console.log('表單資料：', data);
                console.log('試算表 ID：', spreadsheetId);
                
                showLoadingAlert(1);
                
                let fakeProgress = 1;
                const fakeProgressInterval = setInterval(() => {
                    fakeProgress += Math.random() * 15;
                    if (fakeProgress >= 99) {
                        fakeProgress = 99;
                        clearInterval(fakeProgressInterval);
                    }
                    showLoadingAlert(Math.floor(fakeProgress));
                }, 100);
                
                setTimeout(() => {
                    clearInterval(fakeProgressInterval);
                    showLoadingAlert(100);
                    setTimeout(() => {
                        hideLoadingAlert();
                        showAlert('提交成功（測試模式）', 'success');
                        setTimeout(() => {
                            printForm();
                            setTimeout(() => {
                                document.getElementById('userForm').reset();
                            }, 3000);
                        }, 1000);
                    }, 200);
                }, 1000);
            }
        }

        let currentLoadingToast = null;
        let progressInterval = null;

        function showLoadingAlert(progress) {
            if (currentLoadingToast) {
                currentLoadingToast.textContent = '提交中 ' + progress + '%';
                return currentLoadingToast;
            }
            
            const oldToast = document.querySelector('.toast');
            if (oldToast) {
                oldToast.remove();
            }
            
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.textContent = '提交中 ' + progress + '%';
            document.body.appendChild(toast);
            
            setTimeout(() => {
                toast.classList.add('show');
            }, 10);
            
            currentLoadingToast = toast;
            return toast;
        }

        function hideLoadingAlert() {
            if (progressInterval) {
                clearInterval(progressInterval);
                progressInterval = null;
            }
            currentLoadingToast = null;
        }

        function showAlert(message, type) {
            hideLoadingAlert();
            
            const oldToast = document.querySelector('.toast');
            if (oldToast) {
                oldToast.remove();
            }
            
            const toast = document.createElement('div');
            toast.className = 'toast' + (type === 'error' ? ' error' : '');
            toast.textContent = message;
            document.body.appendChild(toast);
            
            setTimeout(() => {
                toast.classList.add('show');
            }, 10);
            
            setTimeout(() => {
                toast.classList.remove('show');
                setTimeout(() => {
                    if (toast.parentNode) {
                        toast.remove();
                    }
                }, 300);
            }, 3000);
        }

        function printForm() {
            document.querySelectorAll('.time-display, .datetime-display').forEach(display => {
                const id = display.id;
                if (id && id.endsWith('_display')) {
                    const baseId = id.replace('_display', '');
                    
                    if (display.classList.contains('time-display')) {
                        const hourSelect = document.getElementById(baseId + '_hour');
                        const minuteSelect = document.getElementById(baseId + '_minute');
                        if (hourSelect && minuteSelect && hourSelect.value && minuteSelect.value) {
                            display.textContent = hourSelect.value + ':' + minuteSelect.value;
                            display.style.display = 'inline';
                        }
                    } else if (display.classList.contains('datetime-display')) {
                        const dateInput = document.getElementById(baseId + '_date');
                        const hourSelect = document.getElementById(baseId + '_hour');
                        const minuteSelect = document.getElementById(baseId + '_minute');
                        if (dateInput && hourSelect && minuteSelect && dateInput.value && hourSelect.value && minuteSelect.value) {
                            display.textContent = dateInput.value + ' ' + hourSelect.value + ':' + minuteSelect.value;
                            display.style.display = 'inline';
                        }
                    }
                }
            });
            
            const allFormGroups = document.querySelectorAll('.form-group');
            
            allFormGroups.forEach(group => {
                let hasValue = false;
                const inputs = group.querySelectorAll('input, select, textarea');
                
                inputs.forEach(input => {
                    if (input.type === 'checkbox' || input.type === 'radio') {
                        if (input.checked) {
                            hasValue = true;
                        }
                    } else {
                        if (input.value && input.value.trim() !== '') {
                            hasValue = true;
                        }
                    }
                });
                
                const timeDisplay = group.querySelector('.time-display');
                const datetimeDisplay = group.querySelector('.datetime-display');
                if (timeDisplay && timeDisplay.textContent) {
                    hasValue = true;
                }
                if (datetimeDisplay && datetimeDisplay.textContent) {
                    hasValue = true;
                }
                
                if (!hasValue && inputs.length > 0) {
                    group.style.display = 'none';
                }
            });
            
            window.print();
            
            setTimeout(() => {
                allFormGroups.forEach(group => {
                    group.style.display = '';
                });
            }, 100);
        }

        window.addEventListener('DOMContentLoaded', loadForm);
        </script>
